      "@type": "Question",

      }

      "@type": "Question",
      "name": "Does WIR replace the insurer's core system?",
      "acceptedAnswer": {
        "@type": "Answer",

      "@type": "Question",
      "name": "How does WIR ensure LGPD compliance?",

        "@type": "Answer",

      }
    },

      "@type": "Question",

      }
    }
