<script>

      var l = document.createElement('link');
      l.rel = 'stylesheet';
      l.href = href;
      document.head.appendChild(l);
    };
    if ('requestIdleCallback' in window) {
      requestIdleCallback(inject, { timeout: 2000 });
    } else {
      setTimeout(inject, 0);
    }
  })();
</script>

        "@type": "Answer",
        "text": "A WIR Innovation é uma plataforma de IA para o mercado segurador brasileiro. Entrega uma camada de inteligência com analytics e dashboards real time para distribuição, subscrição e analytics — sem substituir os sistemas core já em operação na seguradora ou corretora."
      }

    {
      "@type": "Question",
      "name": "Quais produtos a WIR oferece?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Em produção: Smart Sales (SS) — inteligência de distribuição com scoring em tempo real e roteamento automático por apetite × exposure; e Underwriter Intelligence (UI) — subscrição inteligente que interpreta dados e gera cotação automática conforme a política de aceitação de riscos. Em desenvolvimento: X-sell Brokers (XBA) e SDR New Business (SNB)."
      }
    },
    {
      "@type": "Question",
      "name": "A WIR substitui o sistema core da seguradora?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Não. A WIR é uma plataforma 100% externa que opera entre os canais de cotação e o core de apólice, sem exigir migração e sem projeto pesado de TI. A integração é plug-and-play e a transformação operacional é imediata."
      }
    },
    {
      "@type": "Question",
      "name": "Como a WIR garante compliance com a LGPD?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Todos os dados são encriptografados em cada etapa do fluxo e a plataforma opera em conformidade com a LGPD. Cada decisão fica gravada com modelo, versão, inputs, output, timestamp e justificativa — formando uma trilha auditável nativa para os requisitos regulatórios e de governança."
      }
    },
    {
      "@type": "Question",
      "name": "Quais resultados operacionais a plataforma entrega?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Em operações reais acompanhadas pela WIR durante 2025–2026, o padrão observado é: throughput por underwriter de 4× a 7× maior, lead time de cotação reduzido entre 70% e 90%, conversão entre 15% e 35% acima, e custo de despesa administrativa por apólice emitida entre 40% e 60% menor — mantendo o loss ratio estável."
      }
    }
  ]
}
